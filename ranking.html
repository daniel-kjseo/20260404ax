<script type="module">
import { initI18n, t, getCurrentLang } from './src/i18n.js';
import { loadRanking } from './src/likes-tracker.js';
import { QARAH_API_BASE } from './src/api-config.js';

await initI18n();

const CATEGORY_LABELS_KO = {
    korean:   '🇰🇷 한국 이름', english:  '🇺🇸 영어 이름',
    japanese: '🇯🇵 일본 이름', stage:    '🌟 연예인 예명',
    baby:     '👶 아기 이름',   pet:      '🐾 반려동물',
    fantasy:  '🏰 판타지',     bible:    '📖 성경 이름',
};
const CATEGORY_LABELS_EN = {
    korean:   '🇰🇷 Korean',   english:  '🇺🇸 English',
    japanese: '🇯🇵 Japanese', stage:    '🌟 Stage Name',
    baby:     '👶 Baby',       pet:      '🐾 Pet',
    fantasy:  '🏰 Fantasy',   bible:    '📖 Biblical',
};
const CATEGORY_LABELS_JA = {
    korean:   '🇰🇷 韓国語名',  english:  '🇺🇸 英語名',
    japanese: '🇯🇵 日本語名', stage:    '🌟 芸名',
    baby:     '👶 赤ちゃん名', pet:      '🐾 ペット名',
    fantasy:  '🏰 ファンタジー', bible: '📖 聖書名',
};

function getCategoryLabels() {
    const lang = getCurrentLang();
    if (lang === 'en') return CATEGORY_LABELS_EN;
    if (lang === 'ja') return CATEGORY_LABELS_JA;
    return CATEGORY_LABELS_KO;
}

const RANK_MEDALS = ['🥇', '🥈', '🥉'];
let currentPeriod = 'total';

async function renderRanking(period) {
    const content = document.getElementById('rankingContent');
    content.innerHTML = `<div class="ranking-loading">${t('ranking.loading')}</div>`;

    if (!QARAH_API_BASE) {
        content.innerHTML = `
            <div class="ranking-unconfigured">
                <p style="font-size: 1.5rem; margin-bottom: 0.75rem;">🔧</p>
                <p data-i18n="ranking.unconfigured">API가 아직 설정되지 않았습니다.</p>
                <p style="margin-top: 0.5rem; font-size: 0.85rem; color: var(--text-muted);"><code>src/api-config.js</code>에 Cloudflare Workers URL을 입력하면<br>실시간 순위가 표시됩니다.</p>
            </div>`;
        return;
    }

    const items = await loadRanking(period, 10);
    const labels = getCategoryLabels();

    if (!items.length) {
        const periodLabel = {
            total: t('ranking.tab.total'), daily:   t('ranking.tab.daily'),
            weekly: t('ranking.tab.weekly'), monthly: t('ranking.tab.monthly'),
            yearly: t('ranking.tab.yearly'),
        }[period];
        content.innerHTML = `
            <div class="ranking-empty">
                <p style="font-size: 2rem; margin-bottom: 0.5rem;">🌱</p>
                <p>${t('ranking.empty')}</p>
            </div>`;
        return;
    }

    const ul = document.createElement('ul');
    ul.className = 'ranking-list';
    items.forEach((item, i) => {
        const rank  = i + 1;
        const count = item.total || 0;
        const catLabel = labels[item.category] || item.category || '';
        const rankClass = rank <= 3 ? ` top${rank}` : '';
        const medal     = rank <= 3 ? RANK_MEDALS[rank - 1] + ' ' : '';
        const li = document.createElement('li');
        li.className = 'ranking-item';
        li.innerHTML = `
            <div class="ranking-rank${rankClass}">${medal}${rank}</div>
            <div class="ranking-info">
                <div class="ranking-name">${item.name || item.id}</div>
                <span class="ranking-cat">${catLabel}</span>
            </div>
            <div class="ranking-likes">❤️ ${count.toLocaleString()}</div>`;
        ul.appendChild(li);
    });
    content.innerHTML = '';
    content.appendChild(ul);
}

document.getElementById('periodTabs').addEventListener('click', async e => {
    const tab = e.target.closest('.period-tab');
    if (!tab) return;
    document.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentPeriod = tab.dataset.period;
    await renderRanking(currentPeriod);
});

renderRanking('total');

</script>
