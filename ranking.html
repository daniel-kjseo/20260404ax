<script type="module">
import { loadRanking, hasLiked } from './src/likes-tracker.js';
import { isConfigured } from './src/firebase-config.js';

const CATEGORY_LABELS = {
    korean:   '🇰🇷 한국 이름',
    english:  '🇺🇸 영어 이름',
    japanese: '🇯🇵 일본 이름',
    stage:    '🌟 연예인 예명',
    baby:     '👶 아기 이름',
    pet:      '🐾 반려동물',
    fantasy:  '🏰 판타지',
    bible:    '📖 성경 이름',
};

const RANK_MEDALS = ['🥇', '🥈', '🥉'];

let currentPeriod = 'total';

async function renderRanking(period) {
    const content = document.getElementById('rankingContent');
    content.innerHTML = '<div class="ranking-loading">⏳ 불러오는 중...</div>';

    if (!isConfigured()) {
        content.innerHTML = `
            <div class="ranking-unconfigured">
                <p style="font-size: 1.5rem; margin-bottom: 0.75rem;">🔧</p>
                <p>Firebase가 아직 설정되지 않았습니다.</p>
                <p style="margin-top: 0.5rem;"><code>src/firebase-config.js</code>에 Firebase 자격 증명을 입력하면<br>실시간 순위가 표시됩니다.</p>
            </div>`;
        return;
    }

    const items = await loadRanking(period, 10);

    if (!items.length) {
        const periodLabel = { total: '전체', daily: '오늘', weekly: '이번 주', monthly: '이번 달', yearly: '올해' }[period];
        content.innerHTML = `
            <div class="ranking-empty">
                <p style="font-size: 2rem; margin-bottom: 0.5rem;">🌱</p>
                <p>${periodLabel} 기간에 좋아요를 받은 이름이 아직 없습니다.</p>
                <p style="margin-top: 0.5rem; font-size: 0.85rem;">이름을 추천받고 첫 번째 좋아요를 눌러보세요!</p>
            </div>`;
        return;
    }

    const fieldMap = {
        total:   'total',
        daily:   `d_${_dateKey()}`,
        weekly:  `w_${_weekKey()}`,
        monthly: `m_${_monthKey()}`,
        yearly:  `y_${new Date().getFullYear()}`,
    };
    const countField = fieldMap[period];

    const ul = document.createElement('ul');
    ul.className = 'ranking-list';

    items.forEach((item, i) => {
        const rank  = i + 1;
        const count = item[countField] || item.total || 0;
        const catLabel = CATEGORY_LABELS[item.category] || item.category || '';
        const rankClass = rank <= 3 ? ` top${rank}` : '';
        const medal = rank <= 3 ? RANK_MEDALS[rank - 1] + ' ' : '';

        const li = document.createElement('li');
        li.className = 'ranking-item';
        li.innerHTML = `
            <div class="ranking-rank${rankClass}">${medal}${rank}</div>
            <div class="ranking-info">
                <div class="ranking-name">${item.name || item.id}</div>
                <span class="ranking-cat">${catLabel}</span>
            </div>
            <div class="ranking-likes">❤️ ${count.toLocaleString()}</div>
        `;
        ul.appendChild(li);
    });

    content.innerHTML = '';
    content.appendChild(ul);
}

// Tab click
document.getElementById('periodTabs').addEventListener('click', async (e) => {
    const tab = e.target.closest('.period-tab');
    if (!tab) return;
    document.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentPeriod = tab.dataset.period;
    await renderRanking(currentPeriod);
});

// Initial load
renderRanking('total');

function _dateKey() {
    const d = new Date();
    return d.getFullYear().toString()
        + String(d.getMonth() + 1).padStart(2, '0')
        + String(d.getDate()).padStart(2, '0');
}
function _weekKey() {
    const d = new Date();
    const jan1 = new Date(d.getFullYear(), 0, 1);
    const week = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
    return d.getFullYear() + '_' + String(week).padStart(2, '0');
}
function _monthKey() {
    const d = new Date();
    return d.getFullYear().toString() + String(d.getMonth() + 1).padStart(2, '0');
}
</script>
