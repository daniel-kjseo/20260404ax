<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Animal Face Test | Global Face Analysis</title>
    <meta name="description" content="What animal do I look like? Find your animal face type with AI. Privacy safe, no photos saved.">
    <meta name="keywords" content="animal face, ai face test, facial analysis, look alike, puppy face, cat face">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="language-selector">
                <button id="lang-en" class="lang-btn active">English</button>
                <button id="lang-ko" class="lang-btn">한국어</button>
            </div>
            <h1 class="main-title">AI Animal Face Test</h1>
            <p class="subtitle">Global AI Face Analysis</p>
        </header>

        <main>
            <section id="setup-section">
                <div class="gender-selection">
                    <span class="selection-label">Select Gender:</span>
                    <div class="toggle-container">
                        <input type="radio" id="gender-female" name="gender" value="female" checked>
                        <label for="gender-female" class="toggle-btn">👩 Female</label>
                        <input type="radio" id="gender-male" name="gender" value="male">
                        <label for="gender-male" class="toggle-btn">👨 Male</label>
                    </div>
                </div>

                <div class="upload-container" id="drop-zone">
                    <div class="upload-content">
                        <span class="upload-icon">📷</span>
                        <p class="upload-text">Click or drag your photo here</p>
                        <p class="upload-hint">(JPG, PNG up to 10MB)</p>
                    </div>
                    <input type="file" id="file-input" accept="image/*" hidden>
                    <img id="image-preview" class="image-preview hidden">
                </div>
            </section>

            <section id="analysis-section" class="hidden">
                <div class="analysis-status">
                    <div class="loading-bar-container">
                        <div class="loading-bar" id="loading-bar"></div>
                    </div>
                    <p id="analysis-text" class="status-text">⚡ Fast Analysis...</p>
                </div>
            </section>

            <section id="result-section" class="hidden">
                <div class="result-card">
                    <div class="result-header">
                        <span id="result-emoji" class="result-emoji">🐶</span>
                        <h2 id="result-title" class="result-title">Puppy Face</h2>
                    </div>
                    <p id="result-desc" class="result-desc">Friendly and cute, you have the most lovable charm!</p>
                    
                    <div class="percentage-container" id="percentage-list">
                        <!-- Percentages will be injected here -->
                    </div>

                    <div class="action-buttons">
                        <button id="btn-retry" class="btn secondary">Try Again</button>
                        <button id="btn-share" class="btn primary">Share</button>
                    </div>
                </div>
            </section>

            <div class="privacy-notice">
                <span class="lock-icon">🔒</span>
                <span>Photos are never saved on our server.</span>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 AI Animal Face Test. All rights reserved.</p>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
