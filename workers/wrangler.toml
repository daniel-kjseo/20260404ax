name = "qarah-api"
main = "api.js"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "qarah-db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

[vars]
ALLOWED_ORIGIN = "https://qarah.web.app"
